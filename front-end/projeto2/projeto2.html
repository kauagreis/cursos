<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/projeto2.css">
    <title>Pesquisa culturama</title>
</head>
<body>
      <header>
        <h1>Pesquisa Online</h1>
      </header>      
      <section>
        <h2>Dados do Usuário</h2>
        <form action="" method="get">

          <fieldset>
           
            <legend>Dados Pessoais</legend>


              <!--------------NOME-------------->
              <label for="username">Nome</label>
              <input type="text" name="username" id="username" required>


              <br>
             
              <!--------------IDADE-------------->
              <label for="age">Idade</label>
              <input type="number" name="age"  min="12" max="100" id="age" required>
             
              <br>
             
              <!--------------DATA DE NASCIMENTO-------------->
              <label for="birthdate">Data de nascimento</label>
              <input type="date" name="birthdate" id="birthdate" required>            
             
              <br>


              <!--------------E-MAIL-------------->
              <label for="useremail">Email</label>
              <input type="email" name="email" id="useremail" required>
             
              <br>


              <!--------------TELEFONE-------------->
              <label for="userphonenumber">Telefone</label>
              <input type="tel" name="userphonenumber" id="userphonenumber" required pattern="[0-9]{11}" placeholder="XXXXXXXXXXX">
             
              <br>


              <!--------------FOTO-------------->
              <label for="userimage">Upload de Foto</label>
              <input type="file" accept="img/*" name="userimage" id="userimage">


          </fieldset>
  

          <fieldset>
            
            <legend>Perfil</legend>


              <!--------------GENERO-------------->

              <p>Gênero:</p>
              <input type="radio" name="usergender" value="masculino" id="masculino">
              <label for="masculino">Masculino</label>

              <input type="radio" name="usergender" value="feminino" id="feminino">
              <label for="feminino">Feminino</label>

              <input type="radio" name="usergender" value="outro" id="outro">
              <label for="outro">Prefiro não Informar</label>

              <br>

              <!--------------ESTADO CIVIL-------------->

              <label for="maritalstatus">Estado Civil:</label>
              <select name="maritalstatus" id="maritalstatus">

                <option value="notselected">Selecione...</option>
                <option value="casado">casado</option>
                <option value="solteiro">solteiro</option>
                <option value="divorciado">divorciado</option>
                <option value="união estavel">união estável</option>

              </select>

              <br>

              <!--------------ESTADO-------------->
              <label for="userstate">Estado:</label>
              <select name="Estado" required id="userstate">
              
                <option value="notselected">Selecione...</option>
                <option value="Acre">Acre</option>                        
                <option value="Alagoas">Alagoas</option>
                <option value="Amapá">Amapá</option>
                <option value="Amazonas">Amazonas</option>
                <option value="Bahia">Bahia</option>
                <option value="Ceará">Ceará</option>
                <option value="Distrito Federal">Distrito Federal</option>
                <option value="Espirito Santo">Espirito Santo</option>
                <option value="Goiás">Goiás</option>
                <option value="Maranhão">Maranhão</option>
                <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                <option value="Mato Grosso">Mato Grosso</option>
                <option value="Minas Gerais">Minas Gerais </option>
                <option value="Pará">Pará </option>
                <option value="Paraíba">Paraíba</option>
                <option value="Paraná">Paraná</option>
                <option value="Pernambuco">Pernambuco</option>
                <option value="Piauí">Piauí</option>
                <option value="Rio de Janeiro">Rio de Janeiro</option>
                <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                <option value="Rondônia">Rondônia</option>
                <option value="Roraima">Roraima</option>
                <option value="Santa Catarina">Santa Catarina</option>
                <option value="São Paulo">São Paulo</option>
                <option value="Sergipe">Sergipe</option>
                <option value="Tocantins">Tocantins</option>

              </select>

              <br>

              <!--------------CIDADE-------------->

              <label for="usercity">Cidade:</label>
              <input type="text" name="usercity" id="usercity">

          </fieldset>


          <fieldset>

            <legend>Hábitos</legend>


              <!--------------REDES SOCIAIS-------------->

              <p>Redes Sociais</p>
              <input type="checkbox" name="social" value="instagram" id="instagram">
              <label for="instagram">Instagram</label>
              <br>
              <input type="checkbox" name="social" value="facebook" id="facebook">
              <label for="facebook">Facebook</label>
              <br>
              <input type="checkbox" name="social" value="linkedin" id="linkedin">
              <label for="linkedin">LinkedIn</label>
              <br>
              <input type="checkbox" name="social" value="twitter" id="twitter">
              <label for="twitter">X</label>

              <br>

              <!--------------ESTILO MUSICAL-------------->

              <label for="musicstyle">Estilo Musical:</label>
              <input list="styleTypes" type="text" id="musicstyle" name="usermusicstyle">
              <datalist id="styleTypes">
                <option value="Rock">
                <option value="Pop">
                  <option value="Samba">
                <option value="Sertanejo">
              </datalist>

              <br>

              <!--------------COR-------------->

              <label for="color">Cor Favorita:</label>
              <input type="color" name="usercolor" id="color">
              

          </fieldset>


          <fieldset>

            <legend>Opinião</legend>


              <!--------------SATISFAÇÃO------------->

              <p>Satisfação:</p>

              <input type="radio" name="satisfation" id="ótima">
              <label for="ótima">Ótima</label>

              <input type="radio" name="satisfation" id="boa">
              <label for="boa">Boa</label>

              <input type="radio" name="satisfation" id="regular">
              <label for="regular">Regular</label>

              <input type="radio" name="satisfation" id="ruim">
              <label for="ruim">Ruim</label>

              <br>

              <!--------------COMENTÁRIO--------------->

              <label for="comment">Comentário:</label>
              <textarea name="comment" id="comment" placeholder="Deixe seu comentário aqui..."></textarea>

          
          </fieldset>


          <fieldset>

            <legend>Confirmações</legend>

            <!--------------LGPD-------------->

            <input type="checkbox" name="userLgpd" id="lgpd" required value="accepted">
            <label for="lgpd">Eu aceito participar da pesquisa.</label>

            <br>

            <!--------------RECEBER RESULTADOS-------------->

            <input type="checkbox" name="userResult" id="result" value="accepted">
            <label for="result">Desejo receber o resultado no e-mail.</label>

          </fieldset>

          <br>

          <button type="submit">Enviar</button>
          <button type="reset">Limpar</button>
        </form>
      </section>
</body>
</html>
